<label class="input__label">
  @if (label()) {
    <span class="input__label-text">{{ label() }}</span>
  }
  <input
    class="input__field"
    [class.input__field--error]="error()"
    [type]="type()"
    [placeholder]="placeholder()"
    [value]="value"
    [disabled]="isDisabled()"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
</label>
@if (error()) {
  <span class="input__error">{{ error() }}</span>
}
