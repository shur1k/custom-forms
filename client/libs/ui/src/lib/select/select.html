<label class="select__label">
  @if (label()) {
    <span class="select__label-text">{{ label() }}</span>
  }
  <select
    class="select__field"
    [value]="value"
    [disabled]="isDisabled"
    (change)="onSelect($event)"
    (blur)="onBlur()"
  >
    <option value="" disabled>{{ placeholder() }}</option>
    @for (opt of options(); track opt.value) {
      <option [value]="opt.value">{{ opt.label }}</option>
    }
  </select>
</label>
